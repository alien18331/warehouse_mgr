{% extends "base.html" %}
{% block body %}
<h1>編輯料件</h1>
<div class="card">
<form method="post" action="/products/{{ p.id }}/edit" class="row">
  <input type="hidden" name="q" value="{{ q or '' }}">
  <label>品牌
    <select name="brand_id">
      <option value="" {% if not p.brand_id %}selected{% endif %}>—（無品牌）</option>
      {% for b in brands %}
      <option value="{{ b.id }}" {% if b.id==p.brand_id %}selected{% endif %}>{{ b.name }}</option>
      {% endfor %}
    </select>
  </label>
  <label>型號<input type="text" name="model" value="{{ p.model }}" required></label>
  <label style="flex:1;">敘述<input type="text" name="description" value="{{ p.description or '' }}" style="width:100%"></label>
  <label>單位<input type="text" name="base_unit" value="{{ p.base_unit }}" style="width:60px"></label>
  <label>安全庫存<input type="number" step="1" min="0" name="safety_stock" value="{{ p.safety_stock | int }}" style="width:80px"></label>
  <label class="flex"><input type="checkbox" name="track_by_serial" value="1" {% if p.track_by_serial %}checked{% endif %}> 逐 SN 追蹤</label>
  <div style="width:100%; margin-top:8px;">
    <button type="submit" class="btn">儲存</button>
    <a class="btn ghost" href="/products{% if q %}?q={{ q|urlencode }}{% endif %}">取消</a>
  </div>
</form>
</div>
{% endblock %}
