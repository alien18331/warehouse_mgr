{% macro edit_link(href) -%}
<a class="icon-btn" href="{{ href }}" title="編輯">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
</a>
{%- endmacro %}

{% macro delete_form(action, confirm='確定刪除?') -%}
<form method="post" action="{{ action }}" style="display:inline" onsubmit="return confirm('{{ confirm }}')">
  <button class="icon-btn danger" type="submit" title="刪除">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></svg>
  </button>
</form>
{%- endmacro %}
