{% extends "base.html" %}
{% block body %}
<h1>新增借出</h1>
<p class="muted">勾選具體序號 → 指定借入方與預計歸還日 → 送出後序號離庫，並計入借出對帳。</p>

<form method="post" action="/borrow/new" id="borrowForm">
<input type="hidden" name="is_surplus" value="{{ is_surplus }}">

<div class="card">
<div class="row">
  <label>借出日期<input type="date" name="date" required></label>
  <label>借入工號（若借給他工號）
    <select name="borrow_to_project_id">
      <option value="">--</option>
      {% for p in projects %}<option value="{{ p.id }}">{{ p.job_no }} {{ p.owner or '' }}</option>{% endfor %}
    </select>
  </label>
  <label style="flex:1;">或借入方（外部分處 / 文字）<input type="text" name="borrower_text" placeholder="例：台北分處"></label>
  <label>預計歸還日<input type="date" name="expected_return_date" placeholder="非必填"></label>
</div>
<div class="row">
  <label>經手人
    <select name="notifier_id"><option value="">--</option>
    {% for s in staff %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}</select>
  </label>
  <label>簽收人
    <select name="signer_id"><option value="">--</option>
    {% for s in staff %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}</select>
  </label>
  <label style="flex:1;">備註<input type="text" name="note" style="width:100%"></label>
</div>
<small class="muted">※ 借入工號 / 借入方文字 兩者擇一。預計歸還日為選填。</small>
</div>

{% include "_serial_picker.html" %}

<div id="pickerSidebar" class="picker-sidebar">
  <div class="ps-head">
    <strong>已選 <span id="psCount">0</span> 筆</strong>
    <button type="button" class="btn ghost" style="padding:2px 8px;" onclick="psClearAll()">清空</button>
  </div>
  <ul id="psList" class="ps-list"></ul>
  <div id="psEmpty" class="ps-empty">尚未勾選任何序號</div>
  <div style="margin-top:10px; text-align:right;">
    <button type="submit" class="btn" id="psSubmit" disabled>確認借出</button>
  </div>
</div>
<style>
.picker-sidebar { position:fixed; right:18px; bottom:18px; width:320px;
                  background:#fff; border:2px solid #f59e0b; border-radius:10px;
                  box-shadow:0 8px 30px rgba(0,0,0,0.15); padding:14px;
                  z-index:50; max-height:60vh; display:flex; flex-direction:column; }
.picker-sidebar .ps-head { display:flex; justify-content:space-between;
                           align-items:center; margin-bottom:8px; }
.picker-sidebar .ps-list { list-style:none; padding:0; margin:0;
                           overflow-y:auto; flex:1; font-size:12px;
                           font-family:ui-monospace,Menlo,Consolas,monospace; }
.picker-sidebar .ps-list li { display:flex; align-items:center; gap:6px;
                              padding:4px 0; border-bottom:1px solid #f1f5f9; }
.picker-sidebar .ps-list li .x { background:#fee2e2; color:#b91c1c;
                                 border:none; border-radius:3px; cursor:pointer;
                                 padding:0 6px; font-weight:bold; }
.picker-sidebar .ps-list .pool-badge { font-size:10px; padding:0 5px; }
.picker-sidebar .ps-empty { color:#94a3b8; font-size:12px; text-align:center; padding:14px 0; }
</style>

<a class="btn ghost" style="margin-top:18px;" href="/borrow">取消</a>
</form>

<script>
function refreshPickerSidebar() {
  const boxes = document.querySelectorAll('input[name=serial_ids]:checked');
  const nonser = pkCollectNonser();
  const list = document.getElementById('psList');
  const empty = document.getElementById('psEmpty');
  const count = document.getElementById('psCount');
  const submit = document.getElementById('psSubmit');
  list.innerHTML = '';
  boxes.forEach(cb => {
    const li = document.createElement('li');
    const poolKind = cb.dataset.poolKind || 'free';
    li.innerHTML = `<span class="pool-badge ${poolKind}">${cb.dataset.pool}</span>
                    <span style="flex:1;">${cb.dataset.sn}</span>
                    <button type="button" class="x">×</button>`;
    li.querySelector('.x').onclick = () => { cb.checked = false; pkOnCheck(cb); };
    list.appendChild(li);
  });
  nonser.forEach(n => {
    const li = document.createElement('li');
    li.innerHTML = `<span class="pool-badge src">源自 ${n.srcjob}</span>
                    <span style="flex:1;">無序號 ×${n.qty}</span>`;
    list.appendChild(li);
  });
  const total = boxes.length + nonser.reduce((a, b) => a + b.qty, 0);
  count.textContent = total;
  empty.style.display = total ? 'none' : 'block';
  submit.disabled = total === 0;
}
function psClearAll() {
  document.querySelectorAll('input[name=serial_ids]:checked').forEach(cb => {
    cb.checked = false;
    const tr = cb.closest('tr'); if (tr) tr.classList.remove('checked');
  });
  document.querySelectorAll('input.nonser-input').forEach(i => { i.value = 0; pkOnNonser(i); });
  refreshPickerSidebar();
}
document.querySelector('input[name=date]').valueAsDate = new Date();
refreshPickerSidebar();

document.getElementById('borrowForm').addEventListener('submit', function(ev) {
  const toProj = document.querySelector('select[name=borrow_to_project_id]').value;
  const txt = document.querySelector('input[name=borrower_text]').value.trim();
  if (!toProj && !txt) { ev.preventDefault(); alert('請指定借入工號或借入方說明'); return; }
  const sn = document.querySelectorAll('input[name=serial_ids]:checked').length;
  const ns = pkCollectNonser();
  if (sn + ns.reduce((a,b)=>a+b.qty,0) === 0) {
    ev.preventDefault(); alert('請勾選至少一筆序號或填入無序號取用數量'); return;
  }
  const f = ev.target;
  let h = f.querySelector('input[name=nonser_pick]');
  if (!h) { h = document.createElement('input'); h.type='hidden'; h.name='nonser_pick'; f.appendChild(h); }
  h.value = JSON.stringify(ns);
});
</script>
{% endblock %}
